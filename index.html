<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Flex - Suivi Énergie</title>
    <style>
        /* Style global et fond dégradé */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, rgba(52, 199, 89, 0.15) 0%, rgba(255, 149, 0, 0.15) 100%), #f2f2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1c1c1e;
        }

        /* La carte centrale en Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin: 20px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        p { font-size: 1.1rem; line-height: 1.5; color: #3a3a3c; margin-bottom: 10px; }

        /* Conteneur des badges */
        .status-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .badge {
            padding: 12px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
            width: 120px;
        }

        .badge span.label { 
            font-size: 0.70rem; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            opacity: 0.8; 
            margin-bottom: 4px; 
        }
        
        /* États de chargement et couleurs */
        .badge-loading { background-color: rgba(142, 142, 147, 0.2); color: #8e8e93; }
        .badge-eco { background-color: rgba(52, 199, 89, 0.2); color: #28a745; }
        .badge-sobriety { background-color: rgba(255, 149, 0, 0.2); color: #ff9500; }

    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Zen Flex</h1>
        
        <div class="status-container">
            <div id="today-badge" class="badge badge-loading">
                <span class="label">Aujourd'hui</span>
                <span id="today-text">...</span>
            </div>
            <div id="tomorrow-badge" class="badge badge-loading">
                <span class="label">Demain</span>
                <span id="tomorrow-text">...</span>
            </div>
        </div>

        <p>L'application iOS pour suivre facilement la couleur de vos jours EDF Zen Flex.</p>
        <p style="font-size: 0.9rem; color: #666;">Anticipez les jours Sobriété pour optimiser votre consommation.</p>
    </div>

    <script>
        // Formate la date locale au format attendu par EDF (YYYY-MM-DD)
        function formatIsoDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Interrogation de l'API EDF via un proxy CORS gratuit
        async function fetchEDFStatus(date) {
            // Règle contractuelle : Les Week-ends sont toujours ÉCO
            const dayOfWeek = date.getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) return 'eco';

            const dateStr = formatIsoDate(date);
            const targetUrl = `https://particulier.edf.fr/services/rest/opm/getOPMStatut?dateRelevant=${dateStr}`;
            // Proxy pour éviter les blocages du navigateur
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&cb=${Date.now()}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Erreur réseau');
                const data = await response.json();
                
                const status = data.couleurJourJ || "RAS";
                return status === "ZENF_PM" ? 'sobriety' : 'eco';
            } catch (error) {
                console.error("Erreur API EDF pour la date:", dateStr, error);
                // Si l'API ne répond pas, on affiche Éco par défaut
                return 'eco'; 
            }
        }

        // Met à jour visuellement les badges
        function updateBadge(elementId, textId, status) {
            const badge = document.getElementById(elementId);
            const text = document.getElementById(textId);
            
            badge.className = "badge"; // Réinitialise les classes
            if (status === 'eco') {
                badge.classList.add('badge-eco');
                text.innerText = "Éco";
            } else if (status === 'sobriety') {
                badge.classList.add('badge-sobriety');
                text.innerText = "Sobriété";
            } else {
                badge.classList.add('badge-loading');
                text.innerText = "À venir";
            }
        }

        // Lancement au chargement de la page
        async function loadData() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);

            // On lance les deux requêtes en même temps pour gagner encore plus de temps
            Promise.all([
                fetchEDFStatus(today).then(status => updateBadge('today-badge', 'today-text', status)),
                fetchEDFStatus(tomorrow).then(status => updateBadge('tomorrow-badge', 'tomorrow-text', status))
            ]);
        }

        window.onload = loadData;
    </script>

</body>
</html>
